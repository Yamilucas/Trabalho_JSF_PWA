<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <title>Cadastro de Produto</title>
    </h:head>
    <h:body>
        <h1>Cadastro de Produto</h1>
        <h:form>
            <h:outputLabel for="nome" value="Nome:" />
            <h:inputText id="nome" value="#{produtoBean.produto.nome}" /> 
            <br/>
            
            <h:outputLabel for="valor" value="Valor:" />
            <h:inputText id="valor" value="#{produtoBean.produto.valor}" />
            <br/>
            
            <h:outputLabel for="estoque" value="Estoque:" />
            <h:inputText id="estoque" value="#{produtoBean.produto.estoque}" /> 
            <br/>
            
            <h:commandButton value="Cadastrar" action="#{produtoBean.inserir()}" />
            <br/>
            <h:commandButton value="Voltar" action="#{produtoBean.voltar()}" />
        </h:form>
    </h:body>
</html>
