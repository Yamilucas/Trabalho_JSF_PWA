<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"> 

    <h:head>
        <title>Cadastro de Cliente</title>
    </h:head>

    <h:body>
        <h1>Cadastro de Cliente</h1>
        <h:form>
            <h:outputLabel for="nome" value="Nome:" />
            <h:inputText id="nome" value="#{clienteBean.cliente.nome}" />
            <br/>

            <h:outputLabel for="email" value="Email:" />
            <h:inputText id="email" value="#{clienteBean.cliente.email}" />
            <br/>

            <h:outputLabel for="documento" value="Documento:" />
            <h:inputText id="documento" value="#{clienteBean.cliente.documento}" />
            <br/>

            <h:outputLabel for="dataNascimento" value="Data de Nascimento:" />
            <h:inputText id="dataNascimento" value="#{clienteBean.cliente.dataNascimento}">
            </h:inputText>
            <br/>

            <h:commandButton value="Cadastrar" action="#{clienteBean.inserir()}" />
            <br/>
            <h:commandButton value="Voltar" action="#{clienteBean.voltar()}" />
        </h:form>
    </h:body>
</html>
